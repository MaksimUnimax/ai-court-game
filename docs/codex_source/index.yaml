version: 0.1
project: ai-court-game
purpose: >
  Documentation index for the AI Court Game project. Used by ChatGPT and Codex
  to select exact docs paths, enforce documentation gates, and avoid guessing.

repo:
  public_url: "https://github.com/MaksimUnimax/ai-court-game"
  local_root: "/opt/ai-court-game"
  docs_root: "docs/codex_source"

directory_map:
  root: "docs/codex_source"
  rules: "docs/codex_source/rules"
  context: "docs/codex_source/context"
  roadmap: "docs/codex_source/roadmap"
  module_map: "docs/codex_source/module_map"
  project: "docs/codex_source/project"
  prompts: "docs/codex_source/prompts"
  project_snapshot: "docs/codex_source/project_snapshot"
  task_cards: "docs/codex_source/task_cards"
  schemas: "docs/codex_source/schemas"
  templates: "docs/codex_source/templates"

entrypoint:
  - path: "docs/codex_source/ENTRYPOINT_FOR_CHATGPT.md"
    status: "initial"

rules:
  - path: "docs/codex_source/rules/chatgpt_workflow_rules.md"
    status: "initial_adapted"
  - path: "docs/codex_source/rules/codex_prompt_rules.md"
    status: "initial_adapted"
  - path: "docs/codex_source/rules/repo_documentation_access_rules.md"
    status: "initial_adapted"
  - path: "docs/codex_source/rules/runtime_git_rules.md"
    status: "initial_adapted"
  - path: "docs/codex_source/rules/documentation_gate_rules.md"
    status: "initial_adapted"
  - path: "docs/codex_source/rules/workflow_run_modes.md"
    status: "initial_adapted"
  - path: "docs/codex_source/rules/append_only_memory_rules.md"
    status: "initial_adapted"

project_docs:
  - path: "docs/codex_source/project/README.md"
    status: "placeholder"
  - path: "docs/codex_source/project/project_overview.md"
    status: "draft_1"
  - path: "docs/codex_source/project/technical_spec_draft.md"
    status: "draft_1"
  - path: "docs/codex_source/project/draft_mvp_scope.md"
    status: "draft_1"
  - path: "docs/codex_source/prompts/README.md"
    status: "draft_1"
  - path: "docs/codex_source/prompts/scenario_prompt_rules.md"
    status: "draft_1_appendable"
  - path: "docs/codex_source/project_snapshot/PROJECT_SNAPSHOT.md"
    status: "placeholder"
  - path: "docs/codex_source/roadmap/roadmap.md"
    status: "placeholder"
  - path: "docs/codex_source/module_map/module_map.md"
    status: "placeholder"

current_state:
  product_tz_written: true
  roadmap_written: true
  application_code_created: false
  active_blocker: "draft_mvp_docs_ready_for_first_manual_scenario_and_scaffold"
  next_exact_run: "create_first_manual_scenario_schema_or_implement_import_scaffold"
